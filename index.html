<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Password Generator - Secure & Instant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px; 
            width: 100%;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .password-box { 
            font-size: 20px; 
            padding: 20px; 
            background: #f8f9fa; 
            border: 2px dashed #667eea;
            border-radius: 10px; 
            margin: 20px 0; 
            word-break: break-all;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
        }
        button { 
            background: #ff6b35; 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            font-size: 18px; 
            border-radius: 50px; 
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
        }
        button:hover { transform: scale(1.05); background: #e55a2b; }
        .features { 
            margin-top: 25px; 
            color: #666; 
            font-size: 13px; 
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .length-control { margin: 15px 0; }
        .length-control label { font-size: 14px; color: #555; }
        input[type="range"] { width: 100%; margin: 10px 0; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Free Password Generator</h1>
        <p class="subtitle">Create strong, secure passwords instantly.<br>No sign-up required. 100% free.</p>
        
        <div class="length-control">
            <label>Password Length: <span id="lengthVal">16</span></label>
            <input type="range" id="length" min="8" max="32" value="16" oninput="document.getElementById('lengthVal').textContent=this.value">
        </div>
        
        <div class="password-box" id="password">Click generate to create</div>
        <button onclick="generatePassword()" id="generateBtn">Generate Password</button>
        
        <div class="features">
            <span>✓ Secure</span>
            <span>✓ Instant</span>
            <span>✓ Mobile Friendly</span>
            <span>✓ No Registration</span>
        </div>
        
        <div class="footer">
            <a href="privacy.html" style="color:#667eea;">Privacy Policy</a> | 
            <a href="about.html" style="color:#667eea;">About</a>
        </div>
    </div>

    <script>
        function generatePassword() {
            const length = parseInt(document.getElementById('length').value);
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-=[]{}|;:,.<>?";
            let password = "";
            for(let i=0; i<<length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password').textContent = password;
        }
    </script>
</body>
</html>
